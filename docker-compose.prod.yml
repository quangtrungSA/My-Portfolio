# docker-compose.prod.yml — PRODUCTION (Neon cloud DB, no local postgres)
# Usage: docker compose -f docker-compose.prod.yml up --build -d
# Requires: .env.prod file with real credentials

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env.prod
    environment:
      - NEON_JDBC_URL=${NEON_JDBC_URL}
      - NEON_USERNAME=${NEON_USERNAME}
      - NEON_PASSWORD=${NEON_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/profiles"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 5
    networks:
      - portfolio-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:8080
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8080
      - DOCKER=true
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  portfolio-net:
    driver: bridge
