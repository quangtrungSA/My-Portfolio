services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NEON_JDBC_URL=${NEON_JDBC_URL}
      - NEON_USERNAME=${NEON_USERNAME}
      - NEON_PASSWORD=${NEON_PASSWORD}
      - JWT_SECRET=${JWT_SECRET:-myDefaultSuperSecretKeyThatIsAtLeast256BitsLongForHS512Algorithm123456}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/profiles"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - portfolio-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=http://backend:8080
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
