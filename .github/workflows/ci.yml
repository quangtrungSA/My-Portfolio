name: CI - Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================
  # Backend: Java / Spring Boot
  # ============================
  test-backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle*', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make Gradle wrapper executable
        run: chmod +x backend/gradlew

      - name: Build backend
        working-directory: backend
        run: ./gradlew build -x test --no-daemon

      - name: Run tests
        working-directory: backend
        run: ./gradlew test --no-daemon
        continue-on-error: true

  # ============================
  # Frontend: Next.js / pnpm
  # ============================
  test-frontend:
    name: Frontend - Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: frontend
        run: pnpm lint
        continue-on-error: true

      - name: Build
        working-directory: frontend
        run: pnpm build

  # ============================
  # Docker Build Test
  # ============================
  docker-build:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: portfolio-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: portfolio-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================
  # Deploy Backend → Oracle Cloud VM
  # Runs only on push to main (not PRs)
  # Requires secrets: ORACLE_VM_IP, ORACLE_SSH_USER, ORACLE_SSH_PRIVATE_KEY
  # ============================
  deploy-backend:
    name: Deploy Backend to Oracle Cloud
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      ORACLE_VM_IP: ${{ secrets.ORACLE_VM_IP }}

    steps:
      - name: Check Oracle secrets
        id: secrets-check
        run: |
          if [ -z "$ORACLE_VM_IP" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⏭️ ORACLE_VM_IP secret not configured — skipping Oracle deploy"
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.secrets-check.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Deploy via SSH
        if: steps.secrets-check.outputs.available == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ${{ secrets.ORACLE_SSH_USER }}
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR=~/portfolio-backend

            # Clone or pull latest code
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git pull origin main
            else
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # Build and restart backend container
            cd "$APP_DIR/backend"
            cat > docker-compose.yml << 'DEOF'
            services:
              backend:
                build:
                  context: .
                  dockerfile: Dockerfile
                ports:
                  - "127.0.0.1:8080:8080"
                env_file:
                  - .env
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/profiles"]
                  interval: 30s
                  timeout: 5s
                  start_period: 60s
                  retries: 3
            DEOF

            docker compose down --remove-orphans 2>/dev/null || true
            docker compose up --build -d

            # Wait and health check
            echo "⏳ Waiting for backend to start..."
            sleep 30
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/profiles || echo "000")
            echo "Health check: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "⚠️  Backend may still be starting. Check: docker compose logs -f"
            else
              echo "✅ Backend is healthy!"
            fi

            # Prune old Docker images
            docker image prune -f

  # ============================
  # Deploy Backend → Google Cloud Run
  # Runs only on push to main (not PRs)
  # Requires secrets: GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
  # ============================
  deploy-backend-gcloud:
    name: Deploy Backend to Google Cloud Run
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Check GCP secrets
        id: secrets-check
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⏭️ GCP_PROJECT_ID secret not configured — skipping GCloud deploy"
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.secrets-check.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: steps.secrets-check.outputs.available == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.secrets-check.outputs.available == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        if: steps.secrets-check.outputs.available == 'true'
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push backend image
        if: steps.secrets-check.outputs.available == 'true'
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/portfolio-backend:${{ github.sha }}"
          docker build -t "$IMAGE" -t "gcr.io/${{ secrets.GCP_PROJECT_ID }}/portfolio-backend:latest" ./backend
          docker push "$IMAGE"
          docker push "gcr.io/${{ secrets.GCP_PROJECT_ID }}/portfolio-backend:latest"

      - name: Deploy backend to Cloud Run
        if: steps.secrets-check.outputs.available == 'true'
        run: |
          gcloud run deploy portfolio-backend \
            --image "gcr.io/${{ secrets.GCP_PROJECT_ID }}/portfolio-backend:${{ github.sha }}" \
            --platform managed \
            --region asia-southeast1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

  # ============================
  # Deploy Frontend → Google Cloud Run
  # ============================
  deploy-frontend-gcloud:
    name: Deploy Frontend to Google Cloud Run
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Check GCP secrets
        id: secrets-check
        run: |
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⏭️ GCP_PROJECT_ID secret not configured — skipping GCloud deploy"
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.secrets-check.outputs.available == 'true'
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: steps.secrets-check.outputs.available == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.secrets-check.outputs.available == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        if: steps.secrets-check.outputs.available == 'true'
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push frontend image
        if: steps.secrets-check.outputs.available == 'true'
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/portfolio-frontend:${{ github.sha }}"
          docker build -t "$IMAGE" -t "gcr.io/${{ secrets.GCP_PROJECT_ID }}/portfolio-frontend:latest" ./frontend
          docker push "$IMAGE"
          docker push "gcr.io/${{ secrets.GCP_PROJECT_ID }}/portfolio-frontend:latest"

      - name: Deploy frontend to Cloud Run
        if: steps.secrets-check.outputs.available == 'true'
        run: |
          gcloud run deploy portfolio-frontend \
            --image "gcr.io/${{ secrets.GCP_PROJECT_ID }}/portfolio-frontend:${{ github.sha }}" \
            --platform managed \
            --region asia-southeast1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

